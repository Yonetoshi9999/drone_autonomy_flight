[pytest]
# Pytest configuration for aerial photography drone integration tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Test directories
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    integration: Integration tests (modules working together)
    timing: Timing constraint validation tests
    mavlink: MAVLink communication tests
    sensor_fusion: Sensor fusion tests
    nfz: No-fly zone tests
    slow: Tests that take longer to run

# Timeout for tests (seconds)
timeout = 30
